name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KATA_REPO_SLUG: ${{ vars.KATA_REPO_SLUG || 'Autovara/kata' }}
      KATA_BENCHMARKS_REPO_SLUG: ${{ vars.KATA_BENCHMARKS_REPO_SLUG || 'Autovara/kata-benchmarks' }}
      KATA_PRIVATE_BENCHMARKS_REPO_SLUG: ${{ vars.KATA_PRIVATE_BENCHMARKS_REPO_SLUG }}
      KATA_REPO_SLUG_FOR_LINKS: ${{ vars.KATA_REPO_SLUG_FOR_LINKS || 'Autovara/kata' }}
    steps:
      - name: Checkout kata-board
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout Kata data sources
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.KATA_PRIVATE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 "https://github.com/${KATA_REPO_SLUG}.git" ../kata
          git clone --depth 1 "https://github.com/${KATA_BENCHMARKS_REPO_SLUG}.git" ../kata-benchmarks

          if [ -n "${KATA_PRIVATE_BENCHMARKS_REPO_SLUG}" ]; then
            if [ -z "${PRIVATE_REPO_TOKEN}" ]; then
              echo "::warning::KATA_PRIVATE_BENCHMARKS_REPO_SLUG is set but KATA_PRIVATE_REPO_TOKEN is missing; hidden holdout counts will be incomplete."
            else
              git clone --depth 1 "https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/${KATA_PRIVATE_BENCHMARKS_REPO_SLUG}.git" ../kata-benchmarks-private
            fi
          fi

      - name: Export static status
        env:
          KATA_ROOT: ../kata
          KATA_BENCHMARKS_ROOT: ../kata-benchmarks
          KATA_PRIVATE_BENCHMARKS_ROOT: ../kata-benchmarks-private
          KATA_REPO_SLUG: ${{ env.KATA_REPO_SLUG_FOR_LINKS }}
        run: npm run export:status

      - name: Build static board
        env:
          VITE_STATUS_SOURCE: static
          VITE_BASE_PATH: /kata-board/
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
